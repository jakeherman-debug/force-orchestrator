name: Auto-Merge Templated PR

# Auto-merge PRs created by Escape Velocity during service scaffolding
# Generated by Escape Velocity service delivery automation

on:
  pull_request:
    types: [opened, labeled]

jobs:
  auto-merge:
    # Only run if PR is from an allowed GitHub App and has the ready label
    if: |
      (
        github.event.pull_request.user.login == 'escape-velocity-api-prod[bot]' ||
        github.event.pull_request.user.login == 'escape-velocity-portal-prod[bot]'
      ) &&
      contains(github.event.pull_request.labels.*.name, 'escape-velocity-ready')

    uses: teamupstart/cicd-reusable-workflows/.github/workflows/auto-merge-templated-pr-reusable.yml@main
    secrets: inherit
