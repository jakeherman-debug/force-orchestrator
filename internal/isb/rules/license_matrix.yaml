# License compatibility matrix for SUPPLY-004.
#
# Keyed by the REPO's declared license (Repositories.license SPDX ID).
# Each entry lists deps' license SPDX IDs that are explicitly allowed
# (no finding) or explicitly denied (advise-mode finding).
#
# Pairs absent from the matrix → advise-mode + operator review. We do
# NOT auto-allow or auto-deny pairs that are not declared here, and we
# do NOT use an LLM to decide license compatibility at check time —
# this matrix is the only authority. PR-reviewable when it changes.
#
# Reference: https://spdx.org/licenses/
#
# Conservative posture:
#   - Permissive licenses (MIT/BSD/ISC/Apache-2.0/Unlicense/CC0-1.0) are
#     mutually compatible; explicitly allow them in their own rows.
#   - Strong-copyleft licenses (GPL-2.0/3.0, AGPL-3.0) under permissive
#     repos are denied — pulling GPL'd code into an MIT/Apache repo
#     re-licenses derivatives. LGPL handled per-row (linkable from
#     permissive when distributed dynamically; we still deny by default
#     to force operator review).
#   - GPL/AGPL/LGPL repos can absorb permissive deps freely; copyleft
#     terms propagate, so the deny lists are empty (operator-review for
#     anything unusual via the absent-pair path).
#   - MPL-2.0 is intentionally left out of most rows so it lands in
#     advise-mode (file-scope copyleft has nuance worth a human look).

MIT:
  allowed:
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0
    - LGPL-2.1
    - LGPL-3.0

Apache-2.0:
  allowed:
    - Apache-2.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0
    - LGPL-2.1
    # Note: Apache-2.0 is incompatible with GPL-2.0 (patent-clause
    # collision); GPL-3.0 absorbs it but the reverse is denied.

BSD-3-Clause:
  allowed:
    - BSD-3-Clause
    - BSD-2-Clause
    - MIT
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0

BSD-2-Clause:
  allowed:
    - BSD-2-Clause
    - BSD-3-Clause
    - MIT
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0

ISC:
  allowed:
    - ISC
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0

# Permissive public-domain-equivalents — same posture as MIT.
Unlicense:
  allowed:
    - Unlicense
    - CC0-1.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0

CC0-1.0:
  allowed:
    - CC0-1.0
    - Unlicense
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
  deny:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0

# Copyleft repo licenses absorb permissive deps freely. Empty deny
# lists — anything unusual lands in advise-mode via the absent-pair
# path so an operator can review.
GPL-3.0:
  allowed:
    - GPL-3.0
    - LGPL-3.0
    - LGPL-2.1
    - AGPL-3.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
    - MPL-2.0
  deny: []

GPL-2.0:
  allowed:
    - GPL-2.0
    - LGPL-2.1
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    # Apache-2.0 deps inside a GPL-2.0 repo are widely held to be
    # incompatible (patent-clause). GPL-3.0 deps would relicense the
    # whole project upward — that's an operator decision, not auto.
    - Apache-2.0
    - GPL-3.0
    - AGPL-3.0

AGPL-3.0:
  allowed:
    - AGPL-3.0
    - GPL-3.0
    - LGPL-3.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
    - MPL-2.0
  deny: []

LGPL-3.0:
  allowed:
    - LGPL-3.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-2.0

LGPL-2.1:
  allowed:
    - LGPL-2.1
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - Unlicense
    - CC0-1.0
  deny:
    - GPL-3.0
    - AGPL-3.0

# MPL-2.0 — file-scope copyleft. Compatible with permissive deps
# but pairings with GPL-family are intentionally absent so they land
# in advise-mode.
MPL-2.0:
  allowed:
    - MPL-2.0
    - MIT
    - BSD-2-Clause
    - BSD-3-Clause
    - Apache-2.0
    - ISC
    - Unlicense
    - CC0-1.0
  deny: []
