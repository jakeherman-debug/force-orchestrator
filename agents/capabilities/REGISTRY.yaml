description: |
  Fleet-wide tool vocabulary. Every tool an agent could theoretically
  invoke must be listed here. The DisallowedToolsArg complement is
  computed against this registry — tools NOT in a profile but listed in
  REGISTRY are added to --disallowedTools and removed from Claude's
  catalog entirely. Adding a new MCP server or builtin tool requires
  updating this file AND the per-agent profiles that grant it.

builtin_tools:
  - Read
  - Glob
  - Grep
  - Edit
  - Write
  - Bash
  - WebFetch
  - WebSearch
  - LSP
  - NotebookEdit
  - TodoWrite

