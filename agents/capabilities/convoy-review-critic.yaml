agent: convoy-review-critic
description: |
  Adversarial critic for ConvoyReview fix-task spawn decisions (D3
  Phase 5). Given a finding ConvoyReview wants to spawn a fix task
  for, the critic evaluates "would the proposed fix actually close
  the gap, or is it spawning busywork?" A disagreement causes the
  spawn to surface to the operator rather than auto-execute.
builtin_tools: []
mcp_servers: []
notes: |
  Same toolset as primary convoy-review. Anti-cheat enforced at the
  pair-runner write boundary.
