notes: |
  Migration baseline: deterministic synthesiseBriefingText stub.
  D3 polish-pass iteration 2 wires the live Haiku path through
  claude.CallWithTranscript with this profile, gated by
  LIVE_HAIKU_DISABLED env flag. The structured prior-decisions input
  is built BEFORE the Haiku call, so even the live path's IDs come
  from the DB — Pattern P29 still holds.
