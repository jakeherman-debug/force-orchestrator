# D3 Phase 4 — sample 2x2 factorial manifest. Used by
# TestAuthorFromYAML_Factorial2x2RoundTrip in
# internal/experiments/factorial_manifest_test.go to exercise the
# end-to-end path (parse → validate → AuthorFromManifest → DB rows).
# Also serves as the on-disk reference shape for any future EC-emitted
# factorial templates.

name: factorial-2x2-test
hypothesis: "Tighter rules and prompt B both improve approval rate."
min_practical_effect: 0.05
stakes_tier: low
subject_agent: captain
assignment_unit: convoy
duration_cap_hours: 24
budget_usd: 0
hard_cap_usd: 0

kind: factorial
factors:
  - name: prompt
    levels: [A, B]
  - name: rules
    levels: [tight, loose]

treatments:
  - arm_label: cell_A_tight
    prompt_template_ref: captain/A
    model: claude-sonnet-4-6
    target_cell_weight: 0.25
    cell:
      prompt: A
      rules: tight
  - arm_label: cell_A_loose
    prompt_template_ref: captain/A
    model: claude-sonnet-4-6
    target_cell_weight: 0.25
    cell:
      prompt: A
      rules: loose
  - arm_label: cell_B_tight
    prompt_template_ref: captain/B
    model: claude-sonnet-4-6
    target_cell_weight: 0.25
    cell:
      prompt: B
      rules: tight
  - arm_label: cell_B_loose
    prompt_template_ref: captain/B
    model: claude-sonnet-4-6
    target_cell_weight: 0.25
    cell:
      prompt: B
      rules: loose

metrics:
  - metric_name: approval_rate
    metric_version: "1"
    direction: higher_is_better
    is_primary: true
