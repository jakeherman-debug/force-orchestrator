# D3 Phase 2 shakedown experiment.
#
# A benign single-treatment experiment that varies one Captain prompt-
# template version against control. Real-shape, low-stakes — the
# variation is a known-equivalent (the "treatment" arm is a no-op
# rename of the default), so the experiment exercises the lifecycle
# without risking divergent behaviour. The intent is to test author →
# ratify → enrol → terminate → outcome → promotion-proposal end-to-end
# rather than to learn anything about Captain prompts.
#
# To run:
#   force experiment author experiments/2026-04-29-test-captain-prompt-v18/manifest.yaml
#   force experiment ratify <id>
#   # (units enrol via treatments.Apply at hot-path)
#   force experiment terminate <id> --reason=shakedown_complete
#   force experiment status <id>

name: "test-captain-prompt-v18"
hypothesis: |
  Renaming the Captain default prompt ref does not measurably change
  rejection rate. This is a no-op shakedown — the experiment exercises
  the D3 Phase 2 lifecycle end-to-end on a low-stakes variation.
min_practical_effect: 0.02
stakes_tier: low
subject_agent: captain
assignment_unit: task
analysis_framework_version: "2026-04-29"
duration_cap_hours: 168
budget_usd: 5
hard_cap_usd: 10

treatments:
  - arm_label: control
    prompt_template_ref: "captain/default@HEAD"
    target_cell_weight: 0.5
  - arm_label: treatment
    prompt_template_ref: "captain/v18-renamed@HEAD"
    target_cell_weight: 0.5

metrics:
  - metric_name: captain_rejection_rate
    metric_version: "2026-04-23"
    direction: lower_is_better
    is_primary: true

# Optional promotion block — if the experiment terminates with a
# declared winner, MaybePromoteRule mints a PromotionProposal pointing
# at this rule_key and proposed_content. For the shakedown the rule is
# the same no-op rename so the proposal is a paper trail, not a real
# rule change.
promote:
  rule_key: captain-prompt-v18
  proposed_content: |
    Captain prompt template upgraded to v18 (rename of v17 default;
    no semantic change).
